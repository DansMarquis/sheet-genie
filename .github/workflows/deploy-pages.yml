name: Deploy dashboard to GitHub Pages

# The app hosted at https://dansmarquis.github.io/sheet-genie/ is the fully
# static dashboard under `public/dashboard/`. It uses only relative paths and
# CDN scripts (xlsx, dayjs), so no build step is required — we simply publish
# that folder as the Pages artifact.
#
# The surrounding TanStack Start / Nitro / Cloudflare setup in this repo is
# not used for Pages; it targets a server runtime and would need a separate,
# different pipeline to be hosted elsewhere.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel in-flight prod deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Assemble static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pages artifact from public/dashboard
        run: |
          set -euxo pipefail
          rm -rf _site
          mkdir -p _site
          # Copy the static dashboard contents to the Pages artifact root so
          # that https://<user>.github.io/sheet-genie/ serves index.html.
          cp -R public/dashboard/. _site/
          # Also expose it under /dashboard/ for backwards compatibility with
          # any link that still points to /sheet-genie/dashboard/.
          mkdir -p _site/dashboard
          cp -R public/dashboard/. _site/dashboard/
          # Disable Jekyll processing on Pages.
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
